services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-propensity-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./whatsapp_auth:/app/whatsapp_auth
      - whatsapp_bridge_auth:/app/whatsapp_bridge/baileys_auth_info
    restart: unless-stopped

volumes:
  whatsapp_bridge_auth:
